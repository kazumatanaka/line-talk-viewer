<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE Talk Viewer v20 (Perfect Event Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-theme-blue { background-color: #7493c1; }
        .bg-theme-dark { background-color: #1f2937; }
        .bg-theme-pink { background-color: #fbcfe8; }
        .bg-theme-beige { background-color: #f5f5dc; }

        .line-header-bg { background-color: #ffffff; }
        .bubble-other { background-color: #ffffff; color: #000000; }
        .bubble-me { background-color: #85e249; color: #000000; }
        
        .bubble-me::after {
            content: ""; position: absolute; top: 12px; right: -7px;
            border-width: 5px 0 5px 8px; border-style: solid;
            border-color: transparent transparent transparent #85e249;
        }
        .bubble-other::after {
            content: ""; position: absolute; top: 12px; left: -7px;
            border-width: 5px 8px 5px 0; border-style: solid;
            border-color: transparent #ffffff transparent transparent;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col overflow-hidden select-none">

    <header class="line-header-bg border-b border-gray-200 h-14 flex items-center justify-between px-4 z-20 shadow-sm flex-shrink-0">
        <div class="flex items-center space-x-3">
            <button class="text-gray-700 text-xl hover:opacity-70 cursor-pointer">←</button>
            <div id="titleArea" class="cursor-pointer hover:bg-gray-50 active:scale-95 transition-all p-1.5 rounded-lg select-none">
                <h1 id="talkTitle" class="font-bold text-gray-800 text-base">LINE Talk Viewer</h1>
                <p id="talkSub" class="text-[10px] text-gray-400">自動ログインを準備中...</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-2">
            <div id="calendarWrapper" class="relative hidden">
                <input type="date" id="jumpDatePicker" class="absolute inset-0 opacity-0 w-8 h-8 cursor-pointer z-10">
                <button class="p-2 text-gray-600 hover:bg-gray-100 rounded-full transition">📅</button>
            </div>
            <button id="menuBtn" class="p-2 text-gray-600 hover:bg-gray-100 rounded-full transition cursor-pointer z-10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <div id="drawerMenu" class="fixed top-0 right-0 h-full w-80 bg-white shadow-xl z-30 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col border-l border-gray-200">
        <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="font-bold text-gray-700 text-sm">各種設定 & 検索機能</h2>
            <button id="closeMenuBtn" class="text-gray-400 hover:text-gray-600 text-xl font-bold p-1 cursor-pointer">✕</button>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto space-y-4 text-sm flex flex-col min-h-0">
            <div class="space-y-2 bg-blue-50 p-3 rounded-lg border border-blue-100 flex-shrink-0">
                <label class="block text-xs font-bold text-blue-700">クラウド連携（Google Drive）</label>
                <button id="authBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-2 px-3 rounded font-bold shadow-sm transition cursor-pointer">
                    Googleドライブと連携する
                </button>
                <button id="logoutBtn" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs py-1.5 px-3 rounded font-medium shadow-2xs transition hidden cursor-pointer">
                    連携を解除する
                </button>
                
                <div id="driveExplorerZone" class="hidden space-y-1.5 pt-1 flex flex-col min-h-0">
                    <label class="block text-[11px] font-bold text-gray-500">ドライブを探索</label>
                    <div id="breadcrumb" class="text-xs bg-gray-100 p-2 rounded border border-gray-200 text-gray-600 font-medium break-all select-none">
                        読み込み中...
                    </div>
                    <button id="batchLoadBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs py-2 rounded font-bold shadow-sm transition hidden cursor-pointer">
                        ⚡ このフォルダ内のトークをすべて結合
                    </button>
                    <div id="explorerList" class="border border-gray-200 rounded bg-white divide-y divide-gray-100 max-h-40 overflow-y-auto text-xs">
                        <p class="text-gray-400 text-center py-4">読み込み中...</p>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-gray-50 rounded-lg border border-gray-200 space-y-3 flex-shrink-0">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5">🎨 背景着せ替え</label>
                    <div class="grid grid-cols-4 gap-1">
                        <button id="theme-blue" class="bg-[#7493c1] text-white text-[10px] py-1 rounded font-medium border border-black/10 cursor-pointer">ブルー</button>
                        <button id="theme-dark" class="bg-[#1f2937] text-white text-[10px] py-1 rounded font-medium border border-black/10 cursor-pointer">ダーク</button>
                        <button id="theme-pink" class="bg-[#fbcfe8] text-gray-700 text-[10px] py-1 rounded font-medium border border-black/10 cursor-pointer">ピンク</button>
                        <button id="theme-beige" class="bg-[#f5f5dc] text-gray-700 text-[10px] py-1 rounded font-medium border border-black/10 cursor-pointer">ベージュ</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5">🔍 文字サイズ変更</label>
                    <div class="grid grid-cols-3 gap-1">
                        <button id="size-sm" class="bg-white border border-gray-300 text-gray-700 text-xs py-1 rounded cursor-pointer">小</button>
                        <button id="size-md" class="bg-blue-600 border border-blue-600 text-white text-xs py-1 rounded font-bold cursor-pointer">中</button>
                        <button id="size-lg" class="bg-white border border-gray-300 text-gray-700 text-xs py-1 rounded cursor-pointer">大</button>
                    </div>
                </div>
            </div>

            <div class="space-y-1 flex-shrink-0">
                <label class="block text-xs font-bold text-gray-500">「自分」の設定</label>
                <select id="meSelector" class="w-full text-xs border border-gray-300 rounded p-2 bg-white" disabled>
                    <option value="">ファイルを読み込んでください</option>
                </select>
            </div>

            <hr class="border-gray-200 flex-shrink-0">

            <div class="space-y-1 flex-shrink-0">
                <label class="block text-xs font-bold text-gray-500">キーワード検索</label>
                <div class="flex gap-1">
                    <input type="text" id="searchKeyword" placeholder="検索ワードを入力..." class="flex-1 border border-gray-300 rounded p-1.5 text-xs">
                    <button id="searchBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-3 rounded font-medium cursor-pointer">検索</button>
                </div>
                <div id="searchResults" class="mt-2 max-h-32 overflow-y-auto border border-gray-100 rounded hidden divide-y divide-gray-100 text-xs"></div>
            </div>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/30 z-20 hidden transition-opacity"></div>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 bg-theme-blue flex flex-col space-y-4 select-text">
        <div class="text-center text-white text-sm my-auto bg-black/20 rounded-2xl px-6 py-4 max-w-xs self-center shadow-inner">
            <p class="font-bold mb-1">Google Drive & LINE Viewer</p>
            <p id="guideText" class="text-xs text-white/80">APIを読み込んでいます...</p>
        </div>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="onGapiLoad()" async defer></script>

    <script>
        const CLIENT_ID = '903007987907-ctng3cio3hdiedu6ckimvtgkf1d5uq6s.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
        const REDIRECT_URI = 'https://kazumatanaka.github.io/line-talk-viewer/';

        let globalMessages = []; 
        let filteredMessages = []; 
        let currentMe = "";
        let globalSenders = [];

        const PAGE_SIZE = 300; 
        let visibleMessages = []; 
        let currentLoadedIndex = 0; 
        let isLodingMore = false; 

        let currentFolderId = 'root'; 
        let folderHistory = [{ id: 'root', name: 'マイドライブ' }];
        let currentFolderFiles = []; 

        let isCamouflageMode = false;
        let actualPartnerNames = "LINE Talk Viewer"; 

        // DOM取得
        const menuBtn = document.getElementById('menuBtn');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const drawerMenu = document.getElementById('drawerMenu');
        const overlay = document.getElementById('overlay');
        const fileInput = document.getElementById('fileInput');
        const meSelector = document.getElementById('meSelector');
        const chatContainer = document.getElementById('chatContainer');
        const titleArea = document.getElementById('titleArea'); 
        const talkTitle = document.getElementById('talkTitle');
        const talkSub = document.getElementById('talkSub');
        const authBtn = document.getElementById('authBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const driveExplorerZone = document.getElementById('driveExplorerZone');
        const breadcrumb = document.getElementById('breadcrumb');
        const batchLoadBtn = document.getElementById('batchLoadBtn');
        const explorerList = document.getElementById('explorerList');
        const guideText = document.getElementById('guideText');
        const calendarWrapper = document.getElementById('calendarWrapper');
        const jumpDatePicker = document.getElementById('jumpDatePicker');

        const searchKeyword = document.getElementById('searchKeyword');
        const searchBtn = document.getElementById('searchBtn');
        const searchResults = document.getElementById('searchResults');

        const themeBlueBtn = document.getElementById('theme-blue');
        const themeDarkBtn = document.getElementById('theme-dark');
        const themePinkBtn = document.getElementById('theme-pink');
        const themeBeigeBtn = document.getElementById('theme-beige');
        const sizeSmBtn = document.getElementById('size-sm');
        const sizeMdBtn = document.getElementById('size-md');
        const sizeLgBtn = document.getElementById('size-lg');

        // ⚡ 【ここを完全修復】確実ボタン動作が紐づくように初期配置
        menuBtn.addEventListener('click', toggleDrawer);
        closeMenuBtn.addEventListener('click', toggleDrawer);
        overlay.addEventListener('click', toggleDrawer);

        titleArea.addEventListener('click', () => {
            if (globalMessages.length === 0) return;
            isCamouflageMode = !isCamouflageMode;
            applyTitleDisplay();
        });

        function applyTitleDisplay() {
            talkTitle.innerText = isCamouflageMode ? "LINE Talk Viewer" : actualPartnerNames;
        }

        chatContainer.addEventListener('scroll', () => {
            if (globalMessages.length === 0 || isLodingMore) return;
            if (chatContainer.scrollTop <= 50 && currentLoadedIndex < filteredMessages.length) {
                isLodingMore = true;
                loadMorePastMessages();
            }
        });

        jumpDatePicker.addEventListener('change', (e) => {
            const selectedDateStr = e.target.value;
            if (!selectedDateStr) return;
            jumpToSpecificDate(selectedDateStr.replace(/-/g, '/'));
        });

        themeBlueBtn.addEventListener('click', () => changeTheme('blue'));
        themeDarkBtn.addEventListener('click', () => changeTheme('dark'));
        themePinkBtn.addEventListener('click', () => changeTheme('pink'));
        themeBeigeBtn.addEventListener('click', () => changeTheme('beige'));
        sizeSmBtn.addEventListener('click', () => changeFontSize('sm'));
        sizeMdBtn.addEventListener('click', () => changeFontSize('md'));
        sizeLgBtn.addEventListener('click', () => changeFontSize('lg'));

        function onGapiLoad() {
            const savedTheme = localStorage.getItem('user_theme') || 'blue';
            const savedSize = localStorage.getItem('user_font_size') || 'md';
            changeTheme(savedTheme);
            changeFontSize(savedSize);

            openDatabaseAndLoadCache(() => {
                initGoogleApi();
            });
        }

        function changeTheme(themeName) {
            chatContainer.className = `flex-1 overflow-y-auto p-4 flex flex-col space-y-4 select-text bg-theme-${themeName}`;
            localStorage.setItem('user_theme', themeName);
            [themeBlueBtn, themeDarkBtn, themePinkBtn, themeBeigeBtn].forEach(btn => btn.classList.remove('ring-4', 'ring-yellow-400'));
            const targetBtn = document.getElementById(`theme-${themeName}`);
            if(targetBtn) targetBtn.classList.add('ring-4', 'ring-yellow-400');
        }

        function changeFontSize(sizeName) {
            chatContainer.classList.remove('text-xs', 'text-sm', 'text-base', 'text-lg');
            if (sizeName === 'sm') chatContainer.classList.add('text-xs');
            if (sizeName === 'md') chatContainer.classList.add('text-sm');
            if (sizeName === 'lg') chatContainer.classList.add('text-base');
            localStorage.setItem('user_font_size', sizeName);
            [sizeSmBtn, sizeMdBtn, sizeLgBtn].forEach(btn => {
                btn.className = "bg-white border border-gray-300 text-gray-700 text-xs py-1 rounded cursor-pointer";
            });
            const activeBtn = document.getElementById(`size-${sizeName}`);
            if(activeBtn) activeBtn.className = "bg-blue-600 border border-blue-600 text-white text-xs py-1 rounded font-bold cursor-pointer";
        }

        function initGoogleApi() {
            if (typeof gapi === 'undefined' || typeof gapi.client === 'undefined') {
                setTimeout(initGoogleApi, 100);
                return;
            }
            
            gapi.load('client', async () => {
                await gapi.client.init({});
                await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
                
                const savedToken = localStorage.getItem('drive_access_token');
                const tokenExpiry = localStorage.getItem('drive_token_expiry');
                
                if (savedToken && tokenExpiry && Date.now() < parseInt(tokenExpiry, 10)) {
                    gapi.client.setToken({ access_token: savedToken });
                    setAuthSuccessState();
                    const savedHistory = localStorage.getItem('explorer_folder_history');
                    if (savedHistory) {
                        folderHistory = JSON.parse(savedHistory);
                        renderExplorer(folderHistory[folderHistory.length - 1].id);
                    } else {
                        renderExplorer('root');
                    }
                    return;
                }

                const hash = window.location.hash;
                if (hash) {
                    const params = new URLSearchParams(hash.substring(1));
                    const accessToken = params.get('access_token');
                    const expiresIn = params.get('expires_in');
                    if (accessToken) {
                        localStorage.setItem('drive_access_token', accessToken);
                        localStorage.setItem('drive_token_expiry', Date.now() + (parseInt(expiresIn, 10) * 1000));
                        gapi.client.setToken({ access_token: accessToken });
                        window.location.hash = "";
                        setAuthSuccessState();
                        renderExplorer('root');
                        return;
                    }
                }
                if(globalMessages.length === 0) clearUiToUnauthenticated();
            });
        }

        authBtn.addEventListener('click', () => {
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}&prompt=consent`;
            window.location.href = authUrl;
        });

        logoutBtn.addEventListener('click', () => {
            const currentToken = localStorage.getItem('drive_access_token');
            if (currentToken) { google.accounts.oauth2.revokeToken(currentToken, () => {}); }
            localStorage.removeItem('drive_access_token');
            localStorage.removeItem('drive_token_expiry');
            localStorage.removeItem('explorer_folder_history');
            localStorage.removeItem('cached_me_user');
            gapi.client.setToken(null);
            clearIndexedDbCache();

            globalMessages = []; filteredMessages = []; globalSenders = []; currentMe = "";
            clearUiToUnauthenticated();
            calendarWrapper.classList.add('hidden');
            
            chatContainer.innerHTML = `
                <div class="text-center text-white text-sm my-auto bg-black/20 rounded-2xl px-6 py-4 max-w-xs self-center shadow-inner">
                    <p class="font-bold mb-1">Google Drive & LINE Viewer</p>
                    <p class="text-xs text-white/80">内部キャッシュデータを完全消去しました。</p>
                </div>
            `;
            actualPartnerNames = "LINE Talk Viewer"; talkTitle.innerText = "LINE Talk Viewer"; talkSub.innerText = "未連携";
            alert("連携情報を完全に削除しました。");
            toggleDrawer();
        });

        function setAuthSuccessState() {
            authBtn.innerText = "✓ 連携完了";
            authBtn.className = "w-full bg-emerald-600 text-white text-xs py-2 px-3 rounded font-bold shadow-sm select-none pointer-events-none";
            logoutBtn.classList.remove('hidden');
            if(globalMessages.length === 0) {
                guideText.innerText = "自動ログイン成功！右上のメニューからフォルダを選択してください。";
                talkSub.innerText = "フォルダを探してください";
            }
        }

        function clearUiToUnauthenticated() {
            authBtn.innerText = "Googleドライブと連携する";
            authBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-2 px-3 rounded font-bold shadow-sm transition cursor-pointer";
            logoutBtn.classList.add('hidden');
            driveExplorerZone.classList.add('hidden');
            guideText.innerText = "右上のメニューを開き、Googleドライブと連携してください。";
            talkSub.innerText = "未連携";
            currentFolderId = 'root'; folderHistory = [{ id: 'root', name: 'マイドライブ' }]; currentFolderFiles = [];
        }

        async function renderExplorer(folderId) {
            currentFolderId = folderId;
            explorerList.innerHTML = '<p class="text-gray-400 text-center py-4">読み込み中...</p>';
            batchLoadBtn.classList.add('hidden');
            driveExplorerZone.classList.remove('hidden');
            updateBreadcrumb();
            localStorage.setItem('explorer_folder_history', JSON.stringify(folderHistory));

            try {
                const response = await gapi.client.drive.files.list({
                    q: `'${folderId}' in parents and (mimeType = 'application/vnd.google-apps.folder' or mimeType = 'text/plain') and trashed = false`,
                    fields: 'files(id, name, mimeType)', pageSize: 100, orderBy: 'folder,name'
                });
                const files = response.result.files;
                explorerList.innerHTML = ''; currentFolderFiles = [];
                if (!files || files.length === 0) { explorerList.innerHTML = '<p class="text-gray-400 text-center py-4">📁 空っぽのフォルダです</p>'; return; }

                let textFileCount = 0;
                files.forEach(file => {
                    const isFolder = (file.mimeType === 'application/vnd.google-apps.folder');
                    const item = document.createElement('div');
                    item.className = 'p-2.5 hover:bg-gray-50 flex items-center justify-between cursor-pointer transition select-none';
                    if (isFolder) {
                        item.innerHTML = `<span class="font-medium text-gray-700 truncate flex-1">📁 ${file.name}</span>`;
                        item.addEventListener('click', () => { folderHistory.push({ id: file.id, name: file.name }); renderExplorer(file.id); });
                    } else {
                        item.innerHTML = `<span class="text-gray-600 truncate flex-1">📄 ${file.name}</span>`;
                        currentFolderFiles.push(file); textFileCount++;
                        item.addEventListener('click', () => processSingleDriveFile(file.id, file.name));
                    }
                    explorerList.appendChild(item);
                });
                if (textFileCount > 0) {
                    batchLoadBtn.innerText = `⚡ このフォルダ内の一括結合 (${textFileCount}個)`;
                    batchLoadBtn.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function updateBreadcrumb() {
            breadcrumb.innerHTML = '';
            folderHistory.forEach((f, idx) => {
                if (idx > 0) { const arrow = document.createElement('span'); arrow.className = 'mx-1 text-gray-300'; arrow.innerText = '>'; breadcrumb.appendChild(arrow); }
                const node = document.createElement('span'); const isLast = (idx === folderHistory.length - 1);
                node.className = isLast ? 'font-bold text-gray-800' : 'text-blue-600 hover:underline cursor-pointer'; node.innerText = f.name;
                if (!isLast) { node.addEventListener('click', () => { folderHistory = folderHistory.slice(0, idx + 1); renderExplorer(f.id); }); }
                breadcrumb.appendChild(node);
            });
        }

        batchLoadBtn.addEventListener('click', async () => {
            if (currentFolderFiles.length === 0) return;
            talkTitle.innerText = "全自動結合中...";
            let combinedTexts = [];
            for (let file of currentFolderFiles) {
                try { const contentResponse = await gapi.client.drive.files.get({ fileId: file.id, alt: 'media' }); combinedTexts.push({ text: contentResponse.body, name: file.name }); }
                catch (err) { console.error(err); }
            }
            processMultipleTexts(combinedTexts);
        });

        async function processSingleDriveFile(fileId, filename) {
            try { const contentResponse = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' }); processMultipleTexts([{ text: contentResponse.body, name: filename }]); }
            catch (err) { console.error(err); }
        }

        function processMultipleTexts(fileObjects) {
            let allRawMessages = []; let senderCounts = {};
            fileObjects.forEach(obj => { const { messages } = parseLineText(obj.text, obj.name); allRawMessages = allRawMessages.concat(messages); });
            let structuredTimeline = []; let currentFileDateStr = ""; let uniqueMsgKeys = new Set(); let flatMessages = [];
            allRawMessages.forEach(m => { if (m.type === 'date') { currentFileDateStr = m.text; } else if (m.type === 'msg' && currentFileDateStr) { flatMessages.push({ dateStr: currentFileDateStr, time: m.time, sender: m.sender, body: m.body }); } });
            flatMessages.sort((a, b) => parseToTimestamp(a.dateStr, a.time) - parseToTimestamp(b.dateStr, b.time));
            let lastRenderedDateStr = "";
            flatMessages.forEach(m => {
                const uniqueKey = `${m.dateStr}_${m.time}_${m.sender}_${m.body}`;
                if (!uniqueMsgKeys.has(uniqueKey)) {
                    uniqueMsgKeys.add(uniqueKey);
                    if (m.dateStr !== lastRenderedDateStr) { structuredTimeline.push({ type: 'date', text: m.dateStr }); lastRenderedDateStr = m.dateStr; }
                    structuredTimeline.push({ type: 'msg', time: m.time, sender: m.sender, body: m.body });
                    senderCounts[m.sender] = (senderCounts[m.sender] || 0) + 1;
                }
            });
            globalMessages = structuredTimeline; 
            filteredMessages = [...globalMessages]; 
            globalSenders = Object.keys(senderCounts);

            saveDataToIndexedDb(globalMessages);

            let assumedMe = "", maxCount = 0; meSelector.innerHTML = '';
            for (const [sender, count] of Object.entries(senderCounts)) {
                const option = document.createElement('option'); option.value = sender; option.innerText = `${sender} (${count}回)`; meSelector.appendChild(option);
                if (count > maxCount) { maxCount = count; assumedMe = sender; }
            }
            const savedMe = localStorage.getItem('cached_me_user');
            if (savedMe && senderCounts[savedMe]) { currentMe = savedMe; } else if (assumedMe) { currentMe = assumedMe; }
            if(currentMe) { meSelector.value = currentMe; meSelector.disabled = false; localStorage.setItem('cached_me_user', currentMe); }

            talkSub.innerText = `${globalMessages.filter(m => m.type === 'msg').length} 件`;
            updateHeaderTitle();
            startInfiniteRender();
            toggleDrawer();
        }

        function startInfiniteRender() {
            chatContainer.innerHTML = '';
            calendarWrapper.classList.remove('hidden'); 
            
            if (filteredMessages.length === 0) {
                chatContainer.innerHTML = `<div class="text-center text-white text-xs my-auto bg-black/20 rounded-2xl px-6 py-4 max-w-xs self-center shadow-inner"><p class="font-bold mb-1">Google Drive & LINE Viewer</p><p id="guideText" class="text-xs text-white/80">同期済みのデータがありません。右上のメニューからトークファイルを結合してください。</p></div>`;
                return;
            }

            currentLoadedIndex = Math.max(0, filteredMessages.length - PAGE_SIZE);
            visibleMessages = filteredMessages.slice(currentLoadedIndex);
            renderChatSegment(visibleMessages, 'append');
            chatContainer.scrollTop = chatContainer.scrollHeight; 
        }

        function loadMorePastMessages() {
            if (currentLoadedIndex <= 0) { isLodingMore = false; return; }
            const nextStartIndex = Math.max(0, currentLoadedIndex - PAGE_SIZE);
            const additionalSegment = filteredMessages.slice(nextStartIndex, currentLoadedIndex);
            const oldScrollHeight = chatContainer.scrollHeight;
            const oldScrollTop = chatContainer.scrollTop;
            currentLoadedIndex = nextStartIndex;
            renderChatSegment(additionalSegment, 'prepend');
            const newScrollHeight = chatContainer.scrollHeight;
            chatContainer.scrollTop = oldScrollTop + (newScrollHeight - oldScrollHeight);
            isLodingMore = false;
        }

        function jumpToSpecificDate(dateString) {
            let foundIndex = -1;
            for (let i = 0; i < filteredMessages.length; i++) {
                if (filteredMessages[i].type === 'date' && filteredMessages[i].text.includes(dateString)) {
                    foundIndex = i;
                    break;
                }
            }
            if (foundIndex === -1) { alert(`${dateString} 付近のトーク履歴が見つかりませんでした。`); return; }
            currentLoadedIndex = Math.max(0, foundIndex - 50);
            const endIndex = Math.min(filteredMessages.length, currentLoadedIndex + PAGE_SIZE);
            visibleMessages = filteredMessages.slice(currentLoadedIndex, endIndex);
            chatContainer.innerHTML = '';
            renderChatSegment(visibleMessages, 'append');

            setTimeout(() => {
                const dayElements = chatContainer.querySelectorAll('.date-stamp-node');
                for (let el of dayElements) {
                    if (el.innerText.includes(dateString)) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        el.classList.add('ring-4', 'ring-yellow-400');
                        setTimeout(() => el.classList.remove('ring-4', 'ring-yellow-400'), 2000);
                        break;
                    }
                }
            }, 100);
        }

        function renderChatSegment(messages, mode = 'append') {
            const fragment = document.createDocumentFragment();
            messages.forEach((msg, idx) => {
                const globalIndex = currentLoadedIndex + idx;
                if (msg.type === 'date') {
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'date-stamp-node text-center text-white text-[11px] bg-black/15 rounded-full px-3 py-0.5 self-center my-2 select-none z-10';
                    dateDiv.innerText = msg.text;
                    fragment.appendChild(dateDiv);
                } else if (msg.type === 'msg') {
                    const isMe = (msg.sender === currentMe);
                    const msgWrapper = document.createElement('div');
                    msgWrapper.id = `msg-${globalIndex}`;
                    if (isMe) {
                        msgWrapper.className = 'flex items-end justify-end space-x-1.5 space-x-reverse max-w-[85%] self-end p-0.5 rounded-lg';
                        msgWrapper.innerHTML = `<span class="text-[9px] text-white/70 select-none pb-0.5 whitespace-nowrap">${msg.time}</span><div class="bubble-me relative rounded-xl px-3 py-2 text-[13px] shadow-sm break-all whitespace-pre-wrap select-text">${msg.body}</div>`;
                    } else {
                        msgWrapper.className = 'flex items-start space-x-2 max-w-[85%] self-start p-0.5 rounded-lg';
                        msgWrapper.innerHTML = `<div class="w-8 h-8 rounded-full bg-linear-to-br from-amber-400 to-orange-500 flex-shrink-0 flex items-center justify-center text-xs font-bold text-white select-none shadow-sm mt-0.5">${msg.sender.substring(0, 2)}</div><div class="flex flex-col"><span class="text-[11px] text-white/80 mb-0.5 ml-1 select-none font-medium">${msg.sender}</span><div class="flex items-end space-x-1.5"><div class="bubble-other relative rounded-xl px-3 py-2 text-[13px] shadow-sm break-all whitespace-pre-wrap select-text">${msg.body}</div><span class="text-[9px] text-white/70 select-none pb-0.5 whitespace-nowrap">${msg.time}</span></div></div>`;
                    }
                    fragment.appendChild(msgWrapper);
                }
            });
            if (mode === 'prepend') { chatContainer.insertBefore(fragment, chatContainer.firstChild); } 
            else { chatContainer.appendChild(fragment); }
        }

        function saveDataToIndexedDb(dataArray) {
            const request = indexedDB.open("LineViewerCacheDB", 1);
            request.onsuccess = function(e) { e.target.result.transaction("timeline", "readwrite").objectStore("timeline").put({ id: "last_timeline", data: dataArray }); };
        }

        function openDatabaseAndLoadCache(done) {
            const request = indexedDB.open("LineViewerCacheDB", 1);
            
            request.onupgradeneeded = function(e) {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("timeline")) {
                    db.createObjectStore("timeline", { keyPath: "id" });
                }
            };
            
            request.onsuccess = function(e) {
                const db = e.target.result;
                const tx = db.transaction("timeline", "readonly");
                const store = tx.objectStore("timeline");
                const getReq = store.get("last_timeline");
                
                getReq.onsuccess = function() {
                    if (getReq.result && getReq.result.data && getReq.result.data.length > 0) {
                        globalMessages = getReq.result.data;
                        filteredMessages = [...globalMessages];
                        let senderCounts = {}; 
                        globalMessages.forEach(m => { if(m.type === 'msg') { senderCounts[m.sender] = (senderCounts[m.sender] || 0) + 1; } });
                        globalSenders = Object.keys(senderCounts);
                        meSelector.innerHTML = '';
                        for (const [sender, count] of Object.entries(senderCounts)) {
                            const option = document.createElement('option'); option.value = sender; option.innerText = `${sender} (${count}回)`; meSelector.appendChild(option);
                        }
                        const savedMe = localStorage.getItem('cached_me_user');
                        if (savedMe && senderCounts[savedMe]) { currentMe = savedMe; meSelector.value = savedMe; meSelector.disabled = false; }
                        talkSub.innerText = `${globalMessages.filter(m => m.type === 'msg').length} 件`;
                        updateHeaderTitle();
                        startInfiniteRender();
                    } else {
                        const initGuide = document.getElementById('guideText');
                        if(initGuide) initGuide.innerText = "同期済みのデータがありません。右上のメニューからトークファイルを結合してください。";
                        const initSub = document.getElementById('talkSub');
                        if(initSub) initSub.innerText = "未連携";
                    }
                    done(); 
                };
                getReq.onerror = function() { done(); };
            };
            request.onerror = function() { done(); };
        }

        function clearIndexedDbCache() { indexedDB.open("LineViewerCacheDB", 1).onsuccess = function(e) { e.target.result.transaction("timeline", "readwrite").objectStore("timeline").delete("last_timeline"); }; }
        function parseToTimestamp(dateStr, timeStr) { const dMatches = dateStr.match(/\d+/g); const tMatches = timeStr.match(/\d+/g); if (!dMatches || dMatches.length < 3) return 0; const hour = tMatches ? parseInt(tMatches[0], 10) : 0; const min = tMatches ? parseInt(tMatches[1], 10) : 0; return new Date(parseInt(dMatches[0], 10), parseInt(dMatches[1], 10) - 1, parseInt(dMatches[2], 10), hour, min, 0).getTime(); }
        function updateHeaderTitle() { if (globalSenders.length === 0) return; const partners = globalSenders.filter(sender => sender !== currentMe); actualPartnerNames = partners.length > 0 ? partners.join(', ') : currentMe; applyTitleDisplay(); }

        searchBtn.addEventListener('click', () => {
            const keyword = searchKeyword.value.trim().toLowerCase(); searchResults.innerHTML = ''; if (!keyword) { searchResults.classList.add('hidden'); return; }
            let matchCount = 0;
            globalMessages.forEach((msg, index) => {
                if (msg.type === 'msg' && msg.body.toLowerCase().includes(keyword)) {
                    matchCount++; const item = document.createElement('div'); item.className = 'p-2 hover:bg-gray-100 cursor-pointer transition';
                    item.innerHTML = `<div class="flex justify-between font-bold text-gray-600 text-[11px]"><span>${msg.sender}</span><span>${msg.time}</span></div><div class="text-gray-500 truncate mt-0.5">${msg.body.replace(/<br>/g, ' ')}</div>`;
                    item.addEventListener('click', () => {
                        currentLoadedIndex = Math.max(0, index - 50);
                        const endIndex = Math.min(filteredMessages.length, currentLoadedIndex + PAGE_SIZE);
                        visibleMessages = filteredMessages.slice(currentLoadedIndex, endIndex);
                        chatContainer.innerHTML = '';
                        renderChatSegment(visibleMessages, 'append');
                        setTimeout(() => {
                            const targetElement = document.getElementById(`msg-${index}`);
                            if (targetElement) { targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' }); targetElement.classList.add('ring-4', 'ring-yellow-400'); setTimeout(() => targetElement.classList.remove('ring-4', 'ring-yellow-400'), 2000); toggleDrawer(); }
                        }, 100);
                    });
                    searchResults.appendChild(item);
                }
            });
            searchResults.classList.toggle('hidden', matchCount === 0);
            if(matchCount === 0) { searchResults.innerHTML = '<div class="p-3 text-center text-gray-400 text-xs">見つかりませんでした</div>'; searchResults.classList.remove('hidden'); }
        });

        function parseLineText(text, filename) {
            const lines = text.split(/\r?\n/); const messages = []; const senderCounts = {}; let chatPartner = "";
            const fileTitleMatch = filename.match(/\[LINE\]\s*(.+?)とのトーク/); if (fileTitleMatch) chatPartner = fileTitleMatch[1];
            const dateRegex = /^(\d{4}[\/\.\-年]\d{1,2}[\/\.\-月]\d{1,2})/; const msgRegex1 = /^(\d{1,2}:\d{2})[\t]([^\t\n]+)[\t](.*)$/; const msgRegex2 = /^(\d{1,2}:\d{2})\s+([^\s]+)\s+(.*)$/;
            let currentMsgRef = null;
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i]; const trimmedLine = line.trim(); if (trimmedLine === "") { if (currentMsgRef) currentMsgRef.body += '<br>'; continue; }
                if (dateRegex.test(trimmedLine)) { messages.push({ type: 'date', text: trimmedLine }); currentMsgRef = null; continue; }
                let match = line.match(msgRegex1) || line.match(msgRegex2);
                if (match) {
                    const [_, time, sender, body] = match; const cleanedSender = sender.trim(); senderCounts[cleanedSender] = (senderCounts[cleanedSender] || 0) + 1;
                    let cleanBody = body.replace(/\\n/g, '<br>');
                    if (cleanBody === '[スタンプ]' || cleanBody === '[Sticker]') { cleanBody = '🎨 [スタンプ]'; }
                    else if (cleanBody === '[写真]' || cleanBody === '[Photo]') { cleanBody = '📸 [写真]'; }
                    else if (cleanBody === '[動画]' || cleanBody === '[Video]') { cleanBody = '🎬 [動画]'; }
                    const newMsg = { type: 'msg', time: time.trim(), sender: cleanedSender, body: cleanBody }; messages.push(newMsg); currentMsgRef = newMsg;
                } else if (currentMsgRef) { currentMsgRef.body += '<br>' + line; }
                else if (messages.length > 0 && messages[messages.length - 1].type === 'msg') { messages[messages.length - 1].body += '<br>' + line; }
            }
            return { messages, senderCounts, chatPartner };
        }
    </script>
